---
name: "Bug report"
description: "Report a bug with the add-on"
body:
- type: markdown
  attributes:
    value: Before you open a new issue, search through the existing issues to see if others have had the same problem.

- type: input
  attributes:
    label: "Add-on version"
    description: "From Settings → Add-ons → BookStack RAG → Info tab"
    placeholder: "0.1.0"
  validations:
    required: true

- type: input
  attributes:
    label: "Home Assistant version"
    placeholder: "2026.5.0"
  validations:
    required: true

- type: dropdown
  attributes:
    label: "Home Assistant installation type"
    options:
      - Home Assistant OS
      - Home Assistant Supervised
      - Home Assistant Container
      - Home Assistant Core
  validations:
    required: true

- type: input
  attributes:
    label: "LLM endpoint type"
    description: "Ollama / OpenAI / Anthropic-via-proxy / local server / not configured"
    placeholder: "Ollama (local)"

- type: checkboxes
  attributes:
    label: Checklist
    options:
      - label: I have searched [previous issues](../../issues?q=is%3Aissue+label%3A%22bug%22) and this is not a duplicate.
        required: true
      - label: This issue contains exactly one problem (open separate issues for separate problems).
        required: true

- type: textarea
  attributes:
    label: "Describe the issue"
    description: "Clear and concise description of what's wrong."
  validations:
    required: true

- type: textarea
  attributes:
    label: "Reproduction steps"
    value: |
      1.
      2.
      3.
      ...
  validations:
    required: true

- type: textarea
  attributes:
    label: "Add-on logs"
    description: "From Settings → Add-ons → BookStack RAG → Log tab. Redact any LLM API keys before posting."
    render: text
  validations:
    required: true
