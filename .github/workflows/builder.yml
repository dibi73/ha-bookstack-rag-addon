name: Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v)"
        required: true
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ["amd64", "aarch64"]
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve version" && exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION for ${{ matrix.arch }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target bookstack-rag \
            --image "ghcr.io/${{ github.repository_owner }}/{arch}-bookstack-rag-addon" \
            --version "${{ steps.version.outputs.version }}" \
            --docker-hub-check
