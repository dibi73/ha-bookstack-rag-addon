# Multi-arch base images consumed by home-assistant/builder.
#
# armv7 was supported in v0.1.x but dropped from v0.2.0: PyTorch ships no
# official armv7 wheels.
#
# Stage 1 also moves off the alpine variant we used in v0.1.x — PyTorch
# has no musllinux (alpine/musl) wheels either, only manylinux (glibc).
# Home Assistant only publishes alpine variants of base-python, so we
# can no longer reuse their image. We use the upstream `python:3.12-slim`
# (debian-bookworm based, glibc) and bootstrap s6-overlay v3 ourselves
# in the Dockerfile.
build_from:
  amd64: python:3.12-slim-bookworm
  aarch64: python:3.12-slim-bookworm
