# Multi-arch base images for the home-assistant/builder GitHub Action.
#
# Since v0.5.0 the builder workflow (`.github/workflows/builder.yml`) reads
# this file, builds per-arch images and pushes them to ghcr.io. `image:`
# in `config.yaml` points users at those, so Supervisor pulls instead of
# building locally — no more BUILD_FROM-injection drama. The Dockerfile
# picks BUILD_FROM up via ARG with python:3.12-slim-bookworm as fallback,
# so this file is the single source of truth for the base image.
#
# armv7 was supported in v0.1.x but dropped from v0.2.0: PyTorch ships no
# official armv7 wheels. Alpine was tried in v0.1.x and dropped in v0.2.0
# because PyTorch / ONNX Runtime have no musllinux wheels.
build_from:
  amd64: python:3.12-slim-bookworm
  aarch64: python:3.12-slim-bookworm
