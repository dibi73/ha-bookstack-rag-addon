name: BookStack RAG
version: "0.4.1"
slug: bookstack_rag
description: "Local RAG over BookStack-exported HA docs. First install: 5-15 min build (PyTorch + nomic-embed model)."
url: "https://github.com/dibi73/ha-bookstack-rag-addon"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8000
panel_icon: mdi:database-search
panel_title: BookStack RAG
homeassistant_api: false
host_network: false
auth_api: false
map:
  - config:ro
options:
  bookstack_export_path: /config/bookstack_export
  embedding_model: nomic-ai/nomic-embed-text-v1.5
  top_k: 5
  llm_base_url: ""
  llm_api_key: ""
  llm_model: ""
  llm_timeout: 60
  max_turns: 20
  system_prompt: ""
  bookstack_base_url: ""
  homeassistant_base_url: ""
schema:
  bookstack_export_path: str
  embedding_model: str?
  top_k: "int(1,50)?"
  llm_base_url: str?
  llm_api_key: password?
  llm_model: str?
  llm_timeout: "int(5,600)?"
  max_turns: "int(1,200)?"
  system_prompt: str?
  bookstack_base_url: url?
  homeassistant_base_url: url?
